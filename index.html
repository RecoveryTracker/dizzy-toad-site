<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#50341A">
  <title>Dizzy Toad Woodworks</title>
  <meta name="description" content="Hand-turned bowls, vases, and whimsical wood from the Blue Ridge — Dizzy Toad Woodworks, Hendersonville NC. Veteran owned, every piece one of a kind.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Dizzy Toad Woodworks">
  <meta property="og:description" content="Hand-turned bowls, vases & whimsical wood from the Blue Ridge. Veteran owned, every piece one of a kind.">
  <meta property="og:image" content="photos/burl-turquoise.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120' fill='none' stroke='%237C8A3A' stroke-width='8' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M21 50C18 80 34 98 60 98 86 98 102 80 99 50'/%3E%3Ccircle cx='40' cy='40' r='20'/%3E%3Ccircle cx='80' cy='40' r='20'/%3E%3Cpath d='M45 80C52 87 68 87 75 80'/%3E%3C/svg%3E">
  <script>(function(){try{if('scrollRestoration' in history)history.scrollRestoration='manual';}catch(e){}try{var t=localStorage.getItem('dt_theme');document.documentElement.setAttribute('data-theme',t||'booth');}catch(e){document.documentElement.setAttribute('data-theme','booth');}})();</script>
  <style>
    /* ── Themes — switchable via html[data-theme]. "Booth" is the warm
         daytime-market default; Huey & Black Hawk are dark instrument-panel
         looks that make the wood pop on black (an echo of Vic's booth). ── */
    html[data-theme="booth"]{
      --walnut:#50341A; --walnut-deep:#3A2613; --wood:#8A5A2B; --amber:#FFB23E;
      --cream:#F4ECDD; --text:#2C1A0E; --muted:#7A5C3E; --surface:#FDFAF5;
      --card:#FFFFFF; --border:#DDD0BC; --price-color:#50341A; --care-bg:#F4ECDD;
      --accent:#FFB23E; --sold-bg:rgba(44,26,14,.55);
    }
    html[data-theme="huey"]{        /* Huey night cockpit — warm amber instrument glow */
      --walnut:#110C07; --walnut-deep:#0A0705; --wood:#2A2018; --amber:#FFB23E;
      --cream:#F0E4D2; --text:#F0E4D2; --muted:#A8967A; --surface:#19140E;
      --card:#221A12; --border:#3A2E20; --price-color:#FFC55A; --care-bg:#241B11;
      --accent:#FFB23E; --sold-bg:rgba(0,0,0,.62);
    }
    html[data-theme="blackhawk"]{   /* UH-60 panel — cool steel + instrument green */
      --walnut:#0C1013; --walnut-deep:#070A0C; --wood:#1C2429; --amber:#7FB98A;
      --cream:#DBE4E1; --text:#DBE4E1; --muted:#869390; --surface:#12181B;
      --card:#192125; --border:#2A363B; --price-color:#8FCF99; --care-bg:#16201D;
      --accent:#7FB98A; --sold-bg:rgba(0,0,0,.62);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:Georgia,'Times New Roman',serif;background:var(--surface);color:var(--text);line-height:1.65;transition:background-color .35s ease,color .35s ease}
    img{display:block;max-width:100%;height:auto}
    a{color:var(--wood)}
    h1,h2,h3{line-height:1.2;font-weight:700}

    /* ── Nav ─────────────────────────────────────────────── */
    nav{background:var(--walnut);padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;position:sticky;top:0;z-index:100}
    .nav-brand{display:flex;align-items:center;gap:.65rem;text-decoration:none}
    .nav-title{color:var(--cream);font-size:1.1rem;font-weight:700;white-space:nowrap}
    .nav-count{color:var(--amber);font-size:.85rem;font-weight:600;white-space:nowrap}
    .nav-links{display:flex;gap:1.25rem;list-style:none}
    .nav-links a{color:rgba(244,236,221,.75);text-decoration:none;font-size:.9rem}
    .nav-links a:hover{color:var(--amber)}

    /* ── Hero ────────────────────────────────────────────── */
    #hero{background:linear-gradient(150deg,var(--walnut) 0%,var(--walnut-deep) 100%);color:var(--cream);padding:3.5rem 1.25rem 3rem;text-align:center}
    #hero h1{font-size:clamp(1.8rem,5vw,3rem);color:var(--cream);margin-bottom:.75rem}
    #hero .tagline{font-size:clamp(.95rem,2vw,1.15rem);opacity:.85;max-width:520px;margin:0 auto 1.75rem}
    .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.7rem 1.6rem;border-radius:100px;font-size:.95rem;font-weight:700;text-decoration:none;cursor:pointer;border:none}
    .btn-amber{background:var(--amber);color:var(--walnut)}
    .btn-outline{background:transparent;color:var(--cream);border:2px solid rgba(244,236,221,.45)}
    .btn-outline:hover{border-color:var(--cream)}
    .btn-venmo{background:#3D95CE;color:#fff}
    .btn-paypal{background:#0070BA;color:#fff}
    .btn-cashapp{background:#00D632;color:#04341a}
    .hero-btns{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}

    /* ── Filters ─────────────────────────────────────────── */
    .filters{background:var(--surface);border-bottom:1px solid var(--border);padding:.6rem 1rem;display:flex;flex-wrap:nowrap;overflow-x:auto;gap:.5rem;align-items:center;position:sticky;top:56px;z-index:90;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .filters::-webkit-scrollbar{display:none}
    .filter-chip{flex:0 0 auto;white-space:nowrap;padding:.35rem .9rem;border-radius:100px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:.85rem;font-weight:600;cursor:pointer;font-family:Georgia,serif}
    .filter-chip.active{background:var(--walnut);color:var(--cream);border-color:var(--walnut)}
    .filter-sep{flex:0 0 auto;width:1px;height:1.4rem;background:var(--border);margin:0 .25rem}

    /* ── Gallery ─────────────────────────────────────────── */
    .gallery-wrap{max-width:1100px;margin:0 auto;padding:2rem 1rem 4rem}
    .gallery-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1.25rem}
    .gallery-header h2{font-size:1.25rem}
    .gallery-tally{color:var(--muted);font-size:.9rem}
    .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem}

    .piece-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;position:relative}
    .piece-card:hover .piece-img-wrap img{transform:scale(1.03)}
    .piece-img-wrap{width:100%;aspect-ratio:1;overflow:hidden;background:linear-gradient(135deg,#c8a67a 0%,#8A5A2B 100%);position:relative}
    .piece-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .25s}
    .piece-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3.5rem;background:linear-gradient(135deg,#d4b48a 0%,#a07040 100%)}
    .sold-overlay{position:absolute;inset:0;background:var(--sold-bg);display:flex;align-items:center;justify-content:center}
    .sold-badge{background:#fff;color:#2C1A0E;font-size:.9rem;font-weight:800;letter-spacing:.06em;padding:.4rem 1.1rem;border-radius:100px;text-transform:uppercase}
    .reserved-overlay{position:absolute;inset:0;background:rgba(180,120,0,.4);display:flex;align-items:center;justify-content:center}

    .piece-info{padding:.9rem 1rem 1rem}
    .piece-name{font-size:1rem;font-weight:700;margin-bottom:.2rem}
    .piece-meta{font-size:.82rem;color:var(--muted);margin-bottom:.5rem}
    .piece-footer{display:flex;align-items:center;justify-content:space-between}
    .piece-price{font-size:1.15rem;font-weight:800;color:var(--price-color)}
    .avail-dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;flex-shrink:0}

    .empty-msg{grid-column:1/-1;text-align:center;padding:4rem 1rem;color:var(--muted)}

    /* ── Lightbox ────────────────────────────────────────── */
    #lightbox{display:none;position:fixed;inset:0;z-index:300;background:rgba(44,26,14,.7);overflow-y:auto;padding:1.5rem 1rem}
    #lightbox.open{display:flex;align-items:flex-start;justify-content:center}
    .lb-inner{background:var(--surface);border-radius:18px;max-width:680px;width:100%;position:relative;overflow:hidden}
    .lb-close{position:absolute;top:.9rem;right:.9rem;background:rgba(0,0,0,.25);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10}
    .lb-photo{width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,#d4b48a 0%,#a07040 100%);position:relative;overflow:hidden}
    .lb-photo img{width:100%;height:100%;object-fit:cover}
    .lb-photo-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5rem}
    .lb-photo-nav{position:absolute;bottom:.75rem;right:.75rem;display:flex;gap:.4rem}
    .lb-nav-btn{background:rgba(0,0,0,.45);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center}
    .lb-body{padding:1.5rem}
    .lb-status{display:inline-block;padding:.25rem .75rem;border-radius:100px;font-size:.8rem;font-weight:700;margin-bottom:.75rem}
    .lb-status.available{background:#e8f5e9;color:#2e7d32}
    .lb-status.sold{background:#f5f5f5;color:#757575}
    .lb-status.reserved{background:#fff8e1;color:#f57f17}
    .lb-title{font-size:1.5rem;font-weight:700;margin-bottom:.25rem}
    .lb-subtitle{color:var(--muted);font-size:.95rem;margin-bottom:1rem}
    .lb-price{font-size:2rem;font-weight:800;color:var(--price-color);margin-bottom:1.25rem}
    .lb-section{margin-bottom:1.25rem}
    .lb-section h4{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.4rem}
    .lb-section p{font-size:.95rem;line-height:1.6}
    .lb-care{background:var(--care-bg);border-left:3px solid var(--amber);border-radius:0 8px 8px 0;padding:.85rem 1rem}
    .lb-actions{display:flex;flex-direction:column;gap:.65rem}

    /* ── Contact ─────────────────────────────────────────── */
    #contact{background:var(--walnut);color:var(--cream);padding:3rem 1.25rem;text-align:center}
    #contact h2{color:var(--cream);margin-bottom:.5rem}
    #contact p{opacity:.8;max-width:480px;margin:0 auto 1.5rem}
    .contact-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:.65rem;margin-top:1rem}
    .contact-chip{display:flex;align-items:center;gap:.4rem;background:rgba(244,236,221,.12);border:1px solid rgba(244,236,221,.25);border-radius:100px;padding:.45rem 1rem;text-decoration:none;color:var(--cream);font-size:.9rem}
    .contact-chip:hover{background:rgba(244,236,221,.2)}
    #qr-block{display:none;flex-direction:column;align-items:center;gap:.65rem;margin-top:2rem;scroll-margin-top:72px}
    .qr-label{color:var(--amber);font-size:.8rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase}
    #qr-canvas{background:#fff;border-radius:10px;padding:10px;line-height:0}
    #qr-canvas img,#qr-canvas canvas{display:block;border-radius:2px}
    #qr-site{opacity:.5;font-size:.72rem;word-break:break-all;max-width:230px;color:var(--cream)}

    /* ── Footer ──────────────────────────────────────────── */
    footer{background:var(--walnut-deep);color:rgba(244,236,221,.55);text-align:center;padding:1.5rem 1rem;font-size:.82rem}

    /* ── Theme switcher ──────────────────────────────────── */
    .theme-switch{display:flex;gap:.3rem;align-items:center}
    .theme-dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(244,236,221,.35);cursor:pointer;padding:0;transition:transform .15s,border-color .15s}
    .theme-dot:hover{transform:scale(1.12)}
    .theme-dot[aria-pressed="true"]{border-color:var(--amber);transform:scale(1.12)}
    .theme-dot.t-booth{background:linear-gradient(135deg,#8A5A2B,#50341A)}
    .theme-dot.t-huey{background:linear-gradient(135deg,#FFB23E,#110C07)}
    .theme-dot.t-blackhawk{background:linear-gradient(135deg,#7FB98A,#0C1013)}

    /* ── Sections (Shows / About) ────────────────────────── */
    .section{max-width:960px;margin:0 auto;padding:2.75rem 1rem}
    .section-kicker{font-size:.76rem;text-transform:uppercase;letter-spacing:.12em;color:var(--amber);font-weight:800;margin-bottom:.25rem}
    .section h2{font-size:1.6rem;margin-bottom:1.1rem}
    #shows{border-top:1px solid var(--border)}
    #about{border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
    .shows-intro{color:var(--muted);font-size:1rem;margin-bottom:1.1rem;max-width:620px}
    .shows-intro a{color:var(--amber);font-weight:700;text-decoration:none}

    .show-list{display:grid;gap:.85rem;margin-bottom:1.4rem}
    .show-card{display:flex;gap:1rem;align-items:flex-start;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.15rem}
    .show-date{flex:0 0 auto;text-align:center;min-width:52px}
    .show-date .mon{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);font-weight:800}
    .show-date .day{font-size:1.65rem;font-weight:800;color:var(--price-color);line-height:1}
    .show-meta .sname{font-weight:700;font-size:1.05rem}
    .show-meta .swhere{color:var(--muted);font-size:.9rem;margin:.15rem 0}
    .show-meta .swhen{font-size:.9rem;font-weight:600}
    .show-meta .snote{color:var(--muted);font-size:.88rem;margin-top:.35rem;font-style:italic}

    .venues-head{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin-bottom:.7rem}
    .venue-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.7rem}
    .venue-card{display:block;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.85rem 1rem;text-decoration:none;color:var(--text);transition:border-color .15s,transform .15s}
    .venue-card:hover{border-color:var(--amber);transform:translateY(-2px)}
    .venue-card .vname{font-weight:700;font-size:.96rem;margin-bottom:.15rem}
    .venue-card .vwhere{color:var(--muted);font-size:.85rem}
    .venue-card .vlink{color:var(--amber);font-size:.78rem;font-weight:700;margin-top:.4rem;display:inline-block}

    /* About */
    .about-wrap{display:flex;gap:1.9rem;align-items:center;flex-wrap:wrap}
    .about-photo{flex:0 0 220px;width:220px;height:220px;border-radius:18px;overflow:hidden;background:linear-gradient(135deg,var(--wood),var(--walnut-deep));display:flex;align-items:center;justify-content:center}
    .about-photo img{width:100%;height:100%;object-fit:cover}
    .about-text{flex:1;min-width:260px}
    .about-text p{font-size:1.04rem;line-height:1.75;margin-bottom:.9rem}
    .about-vet{display:inline-flex;align-items:center;gap:.4rem;font-size:.82rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--amber)}
    @media(max-width:560px){
      .about-wrap{justify-content:center;text-align:center}
      .about-photo{flex-basis:150px;width:150px;height:150px}
      .about-text{text-align:left}
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media(max-width:560px){
      .nav-links{display:none}
      .nav-count{display:none}
      .nav-title{font-size:1rem}
      nav{padding:.7rem 1rem}
      .theme-dot{width:18px;height:18px}
    }
    @media(max-width:480px){
      .filters{top:52px}
      .gallery{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:.75rem}
      .lb-body{padding:1rem}
      .lb-price{font-size:1.6rem}
    }
  </style>
</head>

<nav>
  <a href="#" class="nav-brand" onclick="closeLightbox();return false">
    <svg width="36" height="36" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#F4ECDD" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

<!-- ═══════════════════════════════════════════════════════════════════════
     JS
     ═══════════════════════════════════════════════════════════════════════ -->
<script>
(function(){
'use strict';

// ── Data layer ──────────────────────────────────────────────────────────
// The published pieces.js is ALWAYS the source of truth customers see. The
// localStorage cache exists only to preserve an admin's in-progress edits
// before they Publish — so it's used in two cases only:
//   1. the admin is logged in on this device, AND
//   2. those edits were made against the *current* published catalog.
// As soon as a newer pieces.js is uploaded (its signature changes) or a
// non-admin visits, the stale cache is dropped. This prevents an old cached
// snapshot from silently shadowing the live catalog (e.g. hiding new pieces).
var STORE_KEY = 'dt_pieces_v1';
var BASE_KEY  = 'dt_pieces_base';   // signature of the catalog the edits were made against
var ADMIN_KEY = 'dt_admin';         // set by admin.js while logged in
function publishedPieces(){ return JSON.parse(JSON.stringify(window.PIECES || [])); }
// Cheap, stable fingerprint of the published catalog (djb2 over its JSON).
function pubSig(){
  var s = JSON.stringify(window.PIECES || []), h = 5381;
  for (var i=0;i<s.length;i++){ h = ((h<<5)+h + s.charCodeAt(i)) | 0; }
  return (window.PIECES?window.PIECES.length:0) + ':' + (h>>>0).toString(36);
}
function isAdmin(){ try { return localStorage.getItem(ADMIN_KEY)==='1'; } catch(e){ return false; } }
function clearLocalCache(){ try { localStorage.removeItem(STORE_KEY); localStorage.removeItem(BASE_KEY); } catch(e){} }
function loadPieces(){
  try {
    if (isAdmin()) {
      var raw  = localStorage.getItem(STORE_KEY);
      var base = localStorage.getItem(BASE_KEY);
      if (raw && base === pubSig()) {
        var arr = JSON.parse(raw);
        if (Array.isArray(arr)) return arr;   // valid in-progress admin edits
      }
    }
  } catch(e){}
  clearLocalCache();              // not admin, or edits are stale against a newer pieces.js
  return publishedPieces();
}
function savePieces(){
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(pieces));
    localStorage.setItem(BASE_KEY, pubSig());
    return true;
  } catch(e){ return false; }
}
function discardLocalEdits(){
  clearLocalCache();
  pieces = publishedPieces();
}

var pieces = loadPieces();
var activeStatus = 'all';
var activeCat    = 'all';
var lbPiece      = null;
var lbPhotoIdx   = 0;
var lbReturnFocus= null;   // element to restore focus to when the lightbox closes

/* ── Helpers ──────────────────────────────────────────────────────────── */
function el(id){ return document.getElementById(id); }
function setText(id,t){ var e=el(id); if(e) e.textContent=t; }
function venmoUrl(amount,note){
  if(!CONFIG.venmo) return null;
  // Web link: opens venmo.com on desktop and deep-links into the app on phones.
  // (The old venmo:// scheme silently did nothing on a laptop browser.)
  var u='https://venmo.com/?txn=pay&recipients='+encodeURIComponent(CONFIG.venmo);
  if(amount>0) u+='&amount='+amount.toFixed(2);
  if(note)     u+='&note='+encodeURIComponent(note);
  return u;
}
function catInfo(c){ return CAT[c]||CAT.other; }
function toadSvg(size){
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 120 120" fill="none" stroke="#F4ECDD" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.9">'
    +'<path d="M21 50 C18 80 34 98 60 98 C86 98 102 80 99 50"/>'
    +'<circle cx="40" cy="40" r="20"/><circle cx="80" cy="40" r="20"/>'
    +'<circle cx="40" cy="43" r="6.5" fill="#FFB23E" stroke="none"/><circle cx="80" cy="43" r="6.5" fill="#FFB23E" stroke="none"/>'
    +'<path d="M45 80 C52 87 68 87 75 80"/></svg>';
}
function parseShowDate(str){
  if(!str) return null;
  var parts=String(str).split('-');
  if(parts.length!==3) return null;
  var d=new Date(+parts[0], +parts[1]-1, +parts[2]);
  return isNaN(d.getTime())?null:d;
}

/* ── Build page chrome ───────────────────────────────────────────────── */
function buildChrome(){
  document.title = CONFIG.shopName;
  setText('nav-title',  CONFIG.shopName);
  setText('hero-title', CONFIG.shopName);
  setText('hero-tagline', CONFIG.tagline);

  if(CONFIG.venmo){
    var vb=el('hero-venmo');
    vb.href=venmoUrl(0,'');
    vb.style.display='inline-flex';
  }
  if(CONFIG.veteran){ el('vet-badge').style.display='block'; }

  // Contact
  setText('contact-title','Commission a piece or say hello');
  var loc = CONFIG.location ? 'Based in '+CONFIG.location+'. ' : '';
  setText('contact-body', loc+'Every piece is made to order or available direct from the booth. Reach out — I love to talk wood.');
  var chips=el('contact-chips');
  var contacts=[];
  if(CONFIG.phone)     contacts.push({href:'tel:'+CONFIG.phone,    label:CONFIG.phone,    icon:'📞'});
  if(CONFIG.email)     contacts.push({href:'mailto:'+CONFIG.email,  label:CONFIG.email,    icon:'✉️'});
  if(CONFIG.instagram) contacts.push({href:'https://instagram.com/'+encodeURIComponent(CONFIG.instagram), label:'@'+CONFIG.instagram, icon:'📸'});
  if(CONFIG.tiktok)    contacts.push({href:'https://tiktok.com/@'+encodeURIComponent(CONFIG.tiktok), label:'@'+CONFIG.tiktok+' on TikTok', icon:'🎵'});
  contacts.forEach(function(c){
    var a=document.createElement('a');
    a.className='contact-chip'; a.href=c.href;
    var i=document.createElement('span'); i.textContent=c.icon;
    var l=document.createElement('span'); l.textContent=c.label;
    a.appendChild(i); a.appendChild(l);
    chips.appendChild(a);
  });

  // Footer
  var yr=new Date().getFullYear();
  var foot='© '+yr+' '+CONFIG.shopName+(CONFIG.location?' · '+CONFIG.location:'')+(CONFIG.veteran?' · Veteran owned':'');
  if(CONFIG.tagline2) foot+='  ·  '+CONFIG.tagline2;
  setText('footer',foot);

  // QR code — encodes CONFIG.website if set, else the current page URL
  (function(){
    var raw=CONFIG.website||'';
    var qrUrl=raw?(/^https?:\/\//.test(raw)?raw:'https://'+raw):window.location.href.replace(/[?#].*/,'');
    if(typeof QRCode==='undefined') return;
    var blk=el('qr-block'); blk.style.display='flex';
    new QRCode(el('qr-canvas'),{text:qrUrl,width:200,height:200,colorDark:'#3A2613',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    var s=el('qr-site'); if(s) s.textContent=qrUrl;
  })();
}

/* ── Filters ─────────────────────────────────────────────────────────── */
function buildFilters(){
  var cats=['all'];
  pieces.forEach(function(p){ if(cats.indexOf(p.category)<0) cats.push(p.category); });
  var wrap=el('filters');
  wrap.innerHTML='';

  function chip(label,isActive,onClick){
    var b=document.createElement('button');
    b.className='filter-chip'+(isActive?' active':'');
    b.textContent=label;
    b.addEventListener('click',onClick);
    return b;
  }

  // Status chips
  [['all','All'],['available','Available'],['sold','Sold']].forEach(function(pair){
    wrap.appendChild(chip(pair[1], activeStatus===pair[0], function(){
      activeStatus=pair[0]; renderGallery(); buildFilters();
    }));
  });

  // Separator
  if(cats.length>1){
    var sep=document.createElement('div'); sep.className='filter-sep'; wrap.appendChild(sep);
    cats.forEach(function(c){
      var label = c==='all' ? 'All types' : catInfo(c).label;
      wrap.appendChild(chip(label, activeCat===c, function(){
        activeCat=c; renderGallery(); buildFilters();
      }));
    });
  }
}

/* ── Gallery ─────────────────────────────────────────────────────────── */
function renderGallery(){
  var filtered = pieces.filter(function(p){
    if(activeStatus!=='all' && p.status!==activeStatus) return false;
    if(activeCat!=='all'    && p.category!==activeCat)  return false;
    return true;
  });

  // Update nav count
  var avail=pieces.filter(function(p){return p.status==='available';}).length;
  setText('nav-count', avail+' available');

  var gallery=el('gallery');
  gallery.innerHTML='';

  if(!filtered.length){
    var msg=document.createElement('p'); msg.className='empty-msg';
    msg.textContent='No pieces match this filter.';
    gallery.appendChild(msg); return;
  }

  filtered.forEach(function(p){
    var card=document.createElement('div');
    card.className='piece-card'; card.setAttribute('role','listitem');
    card.setAttribute('tabindex','0');
    card.dataset.pieceId = p.id;
    card.setAttribute('aria-label',p.name+' — '+(p.status==='available'?'$'+p.price:'Sold'));

    // Photo area
    var imgWrap=document.createElement('div'); imgWrap.className='piece-img-wrap';
    if(p.photos && p.photos.length){
      var img=document.createElement('img');
      img.src=p.photos[0]; img.alt=p.name; img.loading='lazy';
      img.onerror=function(){ var ph=document.createElement('div'); ph.className='piece-placeholder'; ph.textContent=catInfo(p.category).emoji; if(img.parentNode) img.parentNode.replaceChild(ph,img); };
      imgWrap.appendChild(img);
    } else {
      var ph=document.createElement('div'); ph.className='piece-placeholder';
      ph.textContent=catInfo(p.category).emoji;
      imgWrap.appendChild(ph);
    }
    // Overlay
    if(p.status==='sold'){
      var ov=document.createElement('div'); ov.className='sold-overlay';
      var badge=document.createElement('span'); badge.className='sold-badge'; badge.textContent='Sold';
      ov.appendChild(badge); imgWrap.appendChild(ov);
    } else if(p.status==='reserved'){
      var rov=document.createElement('div'); rov.className='reserved-overlay';
      var rb=document.createElement('span'); rb.className='sold-badge'; rb.textContent='Reserved';
      rov.appendChild(rb); imgWrap.appendChild(rov);
    }
    card.appendChild(imgWrap);

    // Info
    var info=document.createElement('div'); info.className='piece-info';
    var name=document.createElement('div'); name.className='piece-name'; name.textContent=p.name;
    var meta=document.createElement('div'); meta.className='piece-meta';
    var metaParts=[]; if(p.species) metaParts.push(p.species); if(p.dimensions) metaParts.push(p.dimensions);
    meta.textContent=metaParts.join(' · ');
    var footer=document.createElement('div'); footer.className='piece-footer';
    var price=document.createElement('div'); price.className='piece-price';
    price.textContent=(p.price>0)?'$'+p.price:'Ask';
    var dot=document.createElement('div');
    dot.style.cssText=p.status==='available'?'width:8px;height:8px;border-radius:50%;background:#4CAF50':
                      p.status==='reserved'?'width:8px;height:8px;border-radius:50%;background:#FF9800':'';
    footer.appendChild(price); footer.appendChild(dot);
    info.appendChild(name); info.appendChild(meta); info.appendChild(footer);
    card.appendChild(info);

    card.addEventListener('click', function(){ openLightbox(p); });
    card.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openLightbox(p); } });
    gallery.appendChild(card);
  });
}

/* ── Lightbox ─────────────────────────────────────────────────────────── */
function openLightbox(p){
  lbPiece=p; lbPhotoIdx=0;
  updateLightboxPhoto();

  // Status badge
  var sb=el('lb-status');
  sb.textContent=p.status==='available'?'Available':p.status==='reserved'?'Reserved':'Sold';
  sb.className='lb-status '+(p.status||'sold');

  setText('lb-name',  p.name);
  var sub=[]; if(p.species) sub.push(p.species); if(p.dimensions) sub.push(p.dimensions);
  if(p.category && CAT[p.category]) sub.push(catInfo(p.category).label);
  setText('lb-subtitle', sub.join(' · '));
  setText('lb-price',  p.price>0 ? '$'+p.price : 'Ask at the booth');

  // Description
  var dw=el('lb-desc-wrap');
  if(p.description){ setText('lb-desc',p.description); dw.style.display=''; }
  else dw.style.display='none';

  // Care
  var cw=el('lb-care-wrap');
  if(p.care){ setText('lb-care',p.care); cw.style.display=''; }
  else cw.style.display='none';

  // Actions — every payment method you've configured shows up here.
  var actions=el('lb-actions');
  actions.innerHTML='';
  if(p.status==='available'){
    var amt = p.price>0 ? p.price : 0;
    function payBtn(cls, href, label){
      var a=document.createElement('a'); a.className='btn '+cls; a.href=href;
      a.target='_blank'; a.rel='noopener'; a.appendChild(document.createTextNode(label));
      actions.appendChild(a); return a;
    }
    if(CONFIG.venmo){
      var va=payBtn('btn-venmo', venmoUrl(amt,p.name), amt?('Pay $'+amt+' on Venmo'):'Pay on Venmo');
      va.removeChild(va.firstChild); // swap text node for icon + text
      va.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.5 3.6c.4.7.6 1.5.6 2.4 0 3-2.6 6.9-4.7 9.6H10L8.2 4.5l5-.5 1 7.9c.9-1.4 2-3.7 2-5.2 0-.9-.2-1.5-.4-2.1l3.7-1z"/></svg>'+(amt?('Pay $'+amt+' on Venmo'):'Pay on Venmo');
    }
    if(CONFIG.paypal)
      payBtn('btn-paypal', 'https://www.paypal.com/paypalme/'+encodeURIComponent(CONFIG.paypal)+(amt?('/'+amt):''), amt?('Pay $'+amt+' with PayPal'):'Pay with PayPal');
    if(CONFIG.cashapp)
      payBtn('btn-cashapp', 'https://cash.app/$'+encodeURIComponent(CONFIG.cashapp)+(amt?('/'+amt):''), amt?('Pay $'+amt+' with Cash App'):'Pay with Cash App');
    if(CONFIG.payLink)
      payBtn('btn-amber', CONFIG.payLink, CONFIG.payLinkLabel||'Buy online');

    // Always offer a human path to buy
    if(CONFIG.email){
      var ea=document.createElement('a');
      ea.className='btn btn-outline'; ea.style.cssText='color:var(--text);border-color:var(--border)';
      ea.href='mailto:'+CONFIG.email+'?subject='+encodeURIComponent('Interested in: '+p.name);
      ea.textContent='Email about this piece';
      actions.appendChild(ea);
    } else if(CONFIG.phone){
      var pa=document.createElement('a');
      pa.className='btn btn-outline'; pa.style.cssText='color:var(--text);border-color:var(--border)';
      pa.href='tel:'+CONFIG.phone;
      pa.textContent='Call about this piece';
      actions.appendChild(pa);
    }
  }
  // Share / copy link
  if(CONFIG.website){
    var shareUrl='https://'+CONFIG.website.replace(/^https?:\/\//,'')+'#piece='+p.id;
    var sa=document.createElement('button');
    sa.className='btn btn-outline'; sa.style.cssText='color:var(--text);border-color:var(--border)';
    sa.textContent='Copy link to this piece';
    sa.addEventListener('click',function(){
      navigator.clipboard&&navigator.clipboard.writeText(shareUrl);
      sa.textContent='Copied!';
      setTimeout(function(){sa.textContent='Copy link to this piece';},2000);
    });
    actions.appendChild(sa);
  }

  // Remember where focus was so we can send it back on close (keyboard a11y).
  if(!el('lightbox').classList.contains('open')) lbReturnFocus=document.activeElement;
  el('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
  var closeBtn=el('lightbox').querySelector('.lb-close');
  if(closeBtn) closeBtn.focus();

  // Update URL fragment so QR codes can link here
  history.replaceState(null,'','#piece='+p.id);
}

function updateLightboxPhoto(){
  var p=lbPiece;
  if(!p) return;
  var photoArea=el('lb-photo');
  // Clear existing img
  var existImg=photoArea.querySelector('img');
  if(existImg) existImg.remove();
  el('lb-placeholder').style.display='';

  if(p.photos && p.photos.length){
    var img=document.createElement('img');
    img.alt=p.name;
    img.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover';
    img.onload=function(){ el('lb-placeholder').style.display='none'; };
    img.onerror=function(){
      var ph=el('lb-placeholder'); ph.textContent=catInfo(p.category).emoji; ph.style.display='';
      if(img.parentNode) img.parentNode.removeChild(img);
    };
    img.src=p.photos[lbPhotoIdx];   // set src AFTER handlers so cached loads still fire
    photoArea.insertBefore(img, photoArea.firstChild);
    el('lb-photo-nav').style.display=p.photos.length>1?'flex':'none';
  } else {
    el('lb-placeholder').textContent=catInfo(p.category).emoji;
    el('lb-photo-nav').style.display='none';
  }
}

function photoNav(dir){
  if(!lbPiece||!lbPiece.photos) return;
  lbPhotoIdx=(lbPhotoIdx+dir+lbPiece.photos.length)%lbPiece.photos.length;
  updateLightboxPhoto();
}

function closeLightbox(){
  el('lightbox').classList.remove('open');
  document.body.style.overflow='';
  lbPiece=null;
  history.replaceState(null,'',window.location.pathname+window.location.search);
  // Return keyboard focus to whatever opened the lightbox.
  if(lbReturnFocus && typeof lbReturnFocus.focus==='function') lbReturnFocus.focus();
  lbReturnFocus=null;
}
window.closeLightbox=closeLightbox;
window.photoNav=photoNav;

// Close on backdrop click
el('lightbox').addEventListener('click',function(e){
  if(e.target===this) closeLightbox();
});
// Close on Escape (only when the lightbox is the thing that's open)
document.addEventListener('keydown',function(e){
  if(e.key==='Escape' && el('lightbox').classList.contains('open')) closeLightbox();
});
// Keep Tab focus inside the dialog while it's open (keyboard a11y).
el('lightbox').addEventListener('keydown',function(e){
  if(e.key!=='Tab') return;
  var nodes=this.querySelectorAll('button, a[href], [tabindex]:not([tabindex="-1"])');
  var f=Array.prototype.filter.call(nodes,function(n){ return n.offsetParent!==null; });
  if(!f.length) return;
  var first=f[0], last=f[f.length-1];
  if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
  else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
});

/* ── Fragment routing — open piece from QR code ────────────────────── */
function checkFragment(){
  var hash=window.location.hash;
  if(hash.indexOf('#piece=')!==0) return;
  var id=hash.slice(7);
  if(!id) return;
  var p=pieces.filter(function(x){return String(x.id)===String(id);})[0];
  if(p) openLightbox(p);
}
// React to hash changes during the session too (back/forward, a pasted link).
window.addEventListener('hashchange',function(){
  var hash=window.location.hash;
  if(hash.indexOf('#piece=')===0){
    var id=hash.slice(7);
    if(!lbPiece || String(lbPiece.id)!==String(id)) checkFragment();
  } else if(lbPiece){
    closeLightbox();
  }
});

/* ── Where to find me (dated shows + recurring venues) ─────────────── */
function buildShows(){
  // Intro line points to socials for exact dates (honest — no stale dates).
  var social = CONFIG.tiktok ? '<a href="https://tiktok.com/@'+encodeURIComponent(CONFIG.tiktok)+'" target="_blank" rel="noopener">@'+CONFIG.tiktok+'</a>'
             : CONFIG.instagram ? '<a href="https://instagram.com/'+encodeURIComponent(CONFIG.instagram)+'" target="_blank" rel="noopener">@'+CONFIG.instagram+'</a>'
             : 'my socials';
  el('shows-intro').innerHTML='I set up at craft markets and maker fairs across the Blue Ridge and Western North Carolina. '
    +'For exact dates, follow along on '+social+' — here are some of the regular spots:';

  // Dated events (usually none; rolling calendar lives on socials)
  var list=el('show-list');
  var today=new Date(); today.setHours(0,0,0,0);
  var upcoming=(window.SHOWS||[]).map(function(s){return {s:s,d:parseShowDate(s.date)};})
    .filter(function(o){ return !o.d || o.d>=today; })
    .sort(function(a,b){ return (a.d||0)-(b.d||0); });
  list.innerHTML='';
  list.style.display = upcoming.length ? '' : 'none';
  var MON=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  upcoming.forEach(function(o){
    var s=o.s, d=o.d;
    var card=document.createElement('div'); card.className='show-card';
    var date=document.createElement('div'); date.className='show-date';
    date.innerHTML = d ? '<div class="mon">'+MON[d.getMonth()]+'</div><div class="day">'+d.getDate()+'</div>'
                       : '<div class="mon">SOON</div>';
    var meta=document.createElement('div'); meta.className='show-meta';
    var where=[s.place,s.city].filter(Boolean).join(' · ');
    meta.innerHTML='<div class="sname"></div>'
      +(where?'<div class="swhere"></div>':'')
      +(s.time?'<div class="swhen"></div>':'')
      +(s.note?'<div class="snote"></div>':'');
    meta.querySelector('.sname').textContent=s.name||'Market';
    if(where) meta.querySelector('.swhere').textContent=where;
    if(s.time) meta.querySelector('.swhen').textContent=s.time;
    if(s.note) meta.querySelector('.snote').textContent=s.note;
    card.appendChild(date); card.appendChild(meta);
    list.appendChild(card);
  });

  // Recurring venues
  var grid=el('venue-grid');
  var venues=window.VENUES||[];
  el('venues-block').style.display = venues.length ? '' : 'none';
  grid.innerHTML='';
  venues.forEach(function(v){
    var a=document.createElement('a');
    a.className='venue-card'; a.href=v.url||'#'; a.target='_blank'; a.rel='noopener';
    var name=document.createElement('div'); name.className='vname'; name.textContent=v.name;
    var where=document.createElement('div'); where.className='vwhere'; where.textContent=v.where||'';
    a.appendChild(name); a.appendChild(where);
    if(v.url){ var lk=document.createElement('span'); lk.className='vlink'; lk.textContent='Details →'; a.appendChild(lk); }
    grid.appendChild(a);
  });
}

/* ── Meet the maker ────────────────────────────────────────────────── */
function buildAbout(){
  setText('about-title','About '+(CONFIG.maker||CONFIG.shopName));
  var box=el('about-text'); box.innerHTML='';
  String(CONFIG.about||'').split('\n').filter(function(s){return s.trim();}).forEach(function(para){
    var p=document.createElement('p'); p.textContent=para.trim(); box.appendChild(p);
  });
  if(CONFIG.veteran){
    var v=document.createElement('div'); v.className='about-vet'; v.textContent='★ Veteran owned & operated';
    box.appendChild(v);
  }
  var ph=el('about-photo');
  if(CONFIG.aboutPhoto){
    var img=new Image(); img.alt=CONFIG.maker||'The maker';
    img.onload=function(){ ph.innerHTML=''; ph.appendChild(img); };
    img.onerror=function(){ ph.innerHTML=toadSvg(72); };
    img.src=CONFIG.aboutPhoto;
  } else {
    ph.innerHTML=toadSvg(72);
  }
}

/* ── Theme switcher (Booth / Huey / Black Hawk) ────────────────────── */
function setupThemes(){
  var current = document.documentElement.getAttribute('data-theme') || 'booth';
  var dots = document.querySelectorAll('.theme-dot');
  function paint(name){
    dots.forEach(function(d){
      d.setAttribute('aria-pressed', d.getAttribute('data-theme-set')===name ? 'true':'false');
    });
  }
  function setTheme(name){
    document.documentElement.setAttribute('data-theme', name);
    try{ localStorage.setItem('dt_theme', name); }catch(e){}
    document.querySelector('meta[name="theme-color"]')
      .setAttribute('content', getComputedStyle(document.documentElement)
        .getPropertyValue('--walnut').trim() || '#50341A');
    paint(name);
  }
  dots.forEach(function(d){
    d.addEventListener('click', function(){ setTheme(d.getAttribute('data-theme-set')); });
  });
  paint(current);
}

/* ── Structured data (schema.org) ──────────────────────────────────────
   Emits a machine-readable product feed so search engines AND AI shopping
   agents can read Vic's catalog — name, photo, price, in-stock/sold. This is
   how a "place where agents look at handmade things to buy" actually works. */
function buildStructuredData(){
  var origin = CONFIG.website ? ('https://'+CONFIG.website.replace(/^https?:\/\//,'').replace(/\/$/,'')) : '';
  var items = pieces.map(function(p, i){
    var prod = {
      "@type":"Product",
      "name": p.name,
      "category": (CAT[p.category]||CAT.other).label,
      "material": p.species || undefined,
      "description": p.description || undefined,
      "brand": { "@type":"Brand", "name": CONFIG.shopName }
    };
    if(p.photos && p.photos.length && /^https?:/.test(p.photos[0])) prod.image = p.photos[0];
    else if(origin && p.photos && p.photos.length) prod.image = origin+'/'+p.photos[0];
    prod.offers = {
      "@type":"Offer",
      "priceCurrency":"USD",
      "price": (p.price>0? p.price : undefined),
      "availability": p.status==='available' ? "https://schema.org/InStock"
                    : p.status==='reserved' ? "https://schema.org/PreOrder"
                    : "https://schema.org/SoldOut",
      "itemCondition":"https://schema.org/NewCondition",
      "seller": { "@type":"Organization", "name": CONFIG.shopName }
    };
    if(origin) prod.url = origin+'#piece='+p.id;
    return { "@type":"ListItem", "position": i+1, "item": prod };
  });
  var data = {
    "@context":"https://schema.org",
    "@type":"ItemList",
    "name": CONFIG.shopName+" — handmade woodturning",
    "itemListElement": items
  };
  var tag = document.getElementById('ld-products');
  if(!tag){ tag=document.createElement('script'); tag.type='application/ld+json'; tag.id='ld-products'; document.head.appendChild(tag); }
  tag.textContent = JSON.stringify(data, function(k,v){ return v===undefined?undefined:v; }, 2);
}

/* ── Re-render everything (used by the admin after edits) ───────────── */
function rerender(){ buildFilters(); renderGallery(); buildStructuredData(); }

/* ── Cloud catalog (Supabase) ────────────────────────────────────────
   The page paints instantly from pieces.js (offline-safe), then swaps in
   the live cloud catalog when it arrives. If the cloud is empty or
   unreachable, the static catalog stays — the site never breaks. */
function mapRow(r){
  return { id:r.id, name:r.name, category:r.category, species:r.species,
    dimensions:r.dimensions, price:Number(r.price)||0, status:r.status||'available',
    photos:Array.isArray(r.photos)?r.photos:[], description:r.description||'',
    care:r.care||'', sort:(r.sort==null?0:r.sort) };
}
function loadFromCloud(){
  if(!window.dtSupa) return Promise.resolve(false);
  return window.dtSupa.from('pieces').select('*').order('sort',{ascending:true})
    .then(function(res){
      if(res.error || !Array.isArray(res.data) || !res.data.length) return false;
      pieces = res.data.map(mapRow);
      clearLocalCache();          // cloud is authoritative; drop any old local cache
      rerender();
      return true;
    })
    .catch(function(){ return false; });
}

/* ── Admin API surface — admin.js drives the site through this ──────── */
window.DT = {
  CONFIG: CONFIG, CAT: CAT,
  getPieces: function(){ return pieces; },
  setPieces: function(arr){ pieces = arr; },
  publishedPieces: publishedPieces,
  save: savePieces,
  discardLocalEdits: discardLocalEdits,
  storeKey: STORE_KEY,
  supa: window.dtSupa,
  refresh: loadFromCloud,
  mapRow: mapRow,
  rerender: rerender,
  openLightbox: openLightbox,
  closeLightbox: closeLightbox,
  catInfo: catInfo,
  toadSvg: toadSvg
};

/* ── Init ──────────────────────────────────────────────────────────── */
buildChrome();
setupThemes();
buildShows();
buildAbout();
buildFilters();
renderGallery();
buildStructuredData();
checkFragment();
loadFromCloud();                                          // upgrade to live cloud catalog
if(window.DizzyToadAdmin) window.DizzyToadAdmin.init();   // admin.js, if loaded
})();
</script>
